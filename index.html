<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de moedas</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <img id="logo-img" width="200" src="./assets/logo.gif" alt="duas-mãos-uma-segurando-dinheiro">
    <main>
        <h1 id="titlle-1">Conversor de moedas</h1>
        <p class="paragraph">Converter de:</p>
        <div class="divs">
            <select id="moeda-1">
                <option value="real">R$ Real Brasileiro (BRL)</option>
                <option value="dolar">US$ Dólar Americano (USD)</option>
                <option value="euro">€ Euro (EUR)</option>
                <option value="coin">₿ Bitcoin (BTC)</option>
                <option value="libra">£ Libra Esterlina (GBP)</option>
            </select>
        </div>
        <p class="paragraph">Converter para:</p>
        <div class="divs">
            <select id="moeda-2">
                <option value="dolar">US$ Dólar Americano (USD)</option>
                <option value="real">R$ Real Brasileiro (BRL)</option>
                <option value="euro">€ Euro (EUR)</option>
                <option value="coin">₿ Bitcoin (BTC)</option>
                <option value="libra">£ Libra Esterlina (GBP)</option>
            </select>
        </div>
        <p class="paragraph-2"></p>
        <p class="paragraph">Valor:</p>
        <div class="divs">
            <input type="number" id="valor" placeholder="Digite o valor.">
        </div>
        <div class="divs">
            <button id="botao-converter">Converter</button>
        </div>

        <section id="resultado">
            <div id="tudo-valor">
                <img width="40" class="img-valor-1" src="./assets/brasil 2 (1).png" alt="bandeira-do-brasil">
                <p class="paragraph-valor-1">Real</p>
                <h3 class="resultado-valor-1">R$ 0,00</h3>
                <img width="23" class="seta" src="./assets/Vector.png" alt="seta-para-baixo">
                <img width="40" class="img-valor-2" src="./assets/estados-unidos.png" alt="bandeira-do-EUA">
                <p class="paragraph-valor-2">Dólar Americano</p>
                <h3 class="resultado-valor-2">US$ 0,00</h3>
            </div>
        </section>
    </main>
</body>
    <script src="scripts.js"></script>

</html>
